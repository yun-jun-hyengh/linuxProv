<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Insert title here</title>
  <link rel="icon" type="image/x-icon" th:href="@{/resources/assets/img/favicon.ico}" />
  <!-- Font Awesome icons (free version)-->
  <script src="https://use.fontawesome.com/releases/v5.13.0/js/all.js" crossorigin="anonymous"></script>
  <!-- Google fonts-->
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
  <link href="https://fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic" rel="stylesheet" type="text/css" />
  <!-- Core theme CSS (includes Bootstrap)-->
  <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>
<body>
<div class="container">
  <div class="row">
    <div class="col-lg-2">
    </div>
    <div class="col-lg-8">
      <div class="panel-body" style="margin-top: 40px;">
        <h2 class="page-header"><span style="color: #ff52a0;">
						 <a th:href="@{/board/boardWriter}" class="btn btn-primary" style="float: right;">글쓰기</a>
	                  <br>
	                </span>
        </h2>
        <table class="table table-hover" style="margin-top: 20px;">
          <thead>
          <tr style="background-color: #A901DB; color: white;  border: 0px solid #f78f24;">
            <th>번호</th>
            <th>제목</th>
            <th>작성자</th>
            <th>첨부파일유무</th>
            <th>등록일자</th>
          </tr>
          </thead>
          <tr th:each="board : ${boardList}" style="color:#ff5xa0;">
            <td th:text="${board.idx}"></td>
            <td><a th:href="@{/board/boardDetail/{idx}(idx=${board.idx})}" th:text="${board.title}"></a></td>
            <td th:text="${board.writer}"></td>
            <td th:text="${board.file_existence}"></td>
            <td th:text="${board.regdate}"></td>
          </tr>

        </table>


      </div>
    </div>
  </div>
</div>

</body>
</html>
