<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Insert title here</title>
  <link rel="icon" type="image/x-icon"
        th:href="@{/resources/static/assets/img/favicon.ico}" />
  <!-- Font Awesome icons (free version)-->
  <script src="https://use.fontawesome.com/releases/v5.13.0/js/all.js"
          crossorigin="anonymous"></script>
  <!-- Google fonts-->
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700"
        rel="stylesheet" type="text/css" />
  <link
          href="https://fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic"
          rel="stylesheet" type="text/css" />
  <!-- Core theme CSS (includes Bootstrap)-->
  <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>
<body>
<header class="masthead text-black text-center">
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">
          <div class="card-header text-white"
               style="background-color: #01DFD7;">게시글 등록</div>
          <div class="card-body">
            <form id="boardform">
              <div class="form-group">
                <label>작성자</label> <input type="text" class="form-control"
                                          name="writer" th:value="${detail.writer}">
              </div>
              <div class="form-group">
                <label>제목</label> <input type="text" class="form-control"
                                         name="title" th:value="${detail.title}">
              </div>
              <div class="form-group">
                <label>내용</label>
                <textarea class="form-control" rows="5" name="content"
                          placeholder="게시글 내용을 입력하세요." th:text="${detail.content}"></textarea>
              </div>
              <div class="form-group">
                <img th:if="${not #strings.isEmpty(detail.filepath)}"
                     th:src="@{/board/board/image(path=${detail.filepath})}"
                     alt="첨부 이미지" width="300" height="300">
              </div>
              &nbsp;&nbsp; <a class="btn form-control"
                              th:href="@{/board/boardfile}"
                              style="cursor: pointer; margin-top: 0; height: 40px; color: white; background-color: #01A9DB; border: 0px solid #388E3C; opacity: 0.8">목록</a>
            </form>
            <br>
            <button th:onclick="|deletePost(${detail.idx})|" class="btn form-control" style="cursor: pointer; margin-top: 0; height: 40px; color: white; background-color: #DF013A; border: 0px solid #388E3C; opacity: 0.8">삭제</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script th:inline="javascript">
  var contextPath = /*[[@{/}]]*/ '/';

  function deletePost(idx) {
    //console.log(idx);
    if(!confirm("정말로 삭제하시겠습니까")) return;

    $.ajax({
      type: "POST",
      url: contextPath + "board/deleteBoard",
      data: { idx: idx },
      success: function(response) {
        alert(response);
        window.location.href = contextPath + "board/boardfile";
      }
    });
  }
</script>
</body>
</html>
